common:
  seed: 42

paths:
  source_images: "./data/images"
  source_labels: "./data/labels"
  output_root: "./output"
  train_images: "./data/train/images"
  train_labels: "./data/train/labels"
  val_images: "./data/val/images"
  val_labels: "./data/val/labels"
  weight_path: "./output/weights/monai_3d_best_model.pth"
  checkpoint_path: "./output/weights/monai_3d_latest.pth"
  log_dir: "./output/logs"
  test_images: "./data/test/images"
  test_labels: "./data/test/labels"

  # 3D 数据预处理参数
data:
  # 统一重采样分辨率 (x, y, z) 单位: mm
  spacing: [1.5, 1.5, 2.0]
  # 腹部 CT 的大致 HU 值范围 (针对肝脾肾等器官)
  a_min: -175.0
  a_max: 250.0
  # 训练时裁剪的 3D Patch 大小
  patch_size: [96, 96, 96]
  # 每次从一张完整 CT 中抠出多少个 Patch (相当于隐形的 batch multiplier)
  num_samples: 5
  num_classes: 14

train:
  num_worker: 0
  batch_size: 2
  lr: 0.0003
  weight_decay: 1e-5
  scheduler_factor: 0.8
  scheduler_patience: 15
  epochs: 1000
  val_interval: 5
  patience: 40
  resume_training: false
